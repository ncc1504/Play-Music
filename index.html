<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ÂM THANH — Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --h: 270;
        --s: 70%;
        --accent: hsl(var(--h), var(--s), 65%);
        --accent-dark: hsl(var(--h), var(--s), 40%);
        --accent-dim: hsla(var(--h), var(--s), 65%, 0.15);
        --accent-glow: hsla(var(--h), var(--s), 65%, 0.4);
        --bg: hsl(var(--h), 20%, 6%);
        --bg2: hsl(var(--h), 15%, 10%);
        --bg3: hsl(var(--h), 12%, 14%);
        --glass: hsla(var(--h), 20%, 100%, 0.05);
        --text: hsl(var(--h), 20%, 95%);
        --text2: hsl(var(--h), 10%, 60%);
        --beat: 0;
        --energy: 0;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        overflow-x: hidden;
        transition: background 0.8s ease;
      }

      /* ─── SCROLLBAR ─── */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 4px;
        transition:
          background 0.3s,
          box-shadow 0.3s;
        border: 2px solid var(--bg);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-dark);
        box-shadow: 0 0 8px var(--accent-glow);
      }

      /* ─── ANIMATED BACKGROUND ─── */
      #bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        transition: background 1s ease;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        transition:
          background 1s ease,
          transform 0.1s ease;
        pointer-events: none;
      }
      #orb1 {
        width: 600px;
        height: 600px;
        top: -200px;
        left: -100px;
        background: var(--accent-dark);
      }
      #orb2 {
        width: 400px;
        height: 400px;
        bottom: -150px;
        right: -100px;
        background: var(--accent);
        opacity: 0.2;
      }
      #orb3 {
        width: 300px;
        height: 300px;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--accent-dark);
        opacity: 0.15;
      }

      #grain {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.4;
      }

      /* ─── LAYOUT ─── */
      #app {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 340px 1fr;
        grid-template-rows: auto 1fr;
        gap: 0;
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* ─── HEADER ─── */
      #header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--glass);
        margin-bottom: 32px;
      }
      #logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 32px;
        letter-spacing: 4px;
        color: var(--accent);
        text-shadow: 0 0 40px var(--accent-glow);
        transition:
          color 0.8s,
          text-shadow 0.8s;
      }
      #header-meta {
        font-size: 12px;
        color: var(--text2);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ─── PLAYER PANEL ─── */
      #player-panel {
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding-right: 32px;
      }

      /* artwork */
      #artwork-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 20px;
        overflow: hidden;
      }
      #artwork-bg {
        position: absolute;
        inset: 0;
        background: var(--accent-dim);
        transition: background 0.8s;
      }
      #artwork-ring {
        position: absolute;
        inset: -4px;
        border-radius: 24px;
        border: 2px solid transparent;
        background:
          linear-gradient(var(--bg), var(--bg)) padding-box,
          linear-gradient(
              135deg,
              var(--accent),
              transparent 50%,
              var(--accent-dark)
            )
            border-box;
        transition: background 0.8s;
        animation: ringPulse 2s ease-in-out infinite;
      }
      @keyframes ringPulse {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      #artwork-inner {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
      }
      #artwork-icon {
        font-size: 64px;
        filter: drop-shadow(0 0 20px var(--accent-glow));
        transition: filter 0.8s;
      }
      #artwork-vinyl {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.5s;
      }
      #artwork-vinyl.visible {
        opacity: 1;
      }
      #vinyl-disc {
        width: 80%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(
          circle at 50%,
          #2a2a2a 0%,
          #111 30%,
          #1a1a1a 50%,
          #0a0a0a 70%
        );
        box-shadow:
          0 0 40px var(--accent-glow),
          inset 0 0 30px rgba(0, 0, 0, 0.5);
        position: relative;
        animation: none;
        transition: box-shadow 0.8s;
      }
      #vinyl-disc.spinning {
        animation: vinyl 4s linear infinite;
      }
      @keyframes vinyl {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      #vinyl-center {
        position: absolute;
        inset: 40%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          var(--accent) 0%,
          var(--accent-dark) 100%
        );
        box-shadow: 0 0 15px var(--accent-glow);
        transition:
          background 0.8s,
          box-shadow 0.8s;
      }
      #vinyl-grooves {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: repeating-radial-gradient(
          circle at 50%,
          transparent 0px,
          transparent 8px,
          rgba(255, 255, 255, 0.02) 8px,
          rgba(255, 255, 255, 0.02) 9px
        );
      }

      /* track info - removed from top */

      /* progress */
      #progress-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #track-name-marquee {
        position: relative;
        height: 24px;
        overflow: hidden;
        background: var(--bg2);
        border-radius: 8px;
        border: 1px solid var(--glass);
        display: flex;
        align-items: center;
      }
      #track-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 16px;
        letter-spacing: 1px;
        color: var(--text);
        white-space: nowrap;
        animation: marquee 15s linear infinite;
        padding: 0 12px;
        transition: color 0.5s;
      }
      #track-name:hover {
        animation-play-state: paused;
      }
      @keyframes marquee {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }
      #progress-bar-wrap {
        position: relative;
        height: 4px;
        border-radius: 4px;
        background: var(--bg3);
        cursor: pointer;
        overflow: visible;
      }
      #progress-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--accent-dark), var(--accent));
        transition:
          width 0.1s linear,
          background 0.8s;
        pointer-events: none;
      }
      #progress-thumb {
        position: absolute;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px var(--accent-glow);
        pointer-events: none;
        transition:
          background 0.8s,
          box-shadow 0.8s;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #progress-bar-wrap:hover #progress-thumb {
        opacity: 1;
      }
      #time-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text2);
        letter-spacing: 1px;
      }

      /* controls */
      #controls-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .ctrl {
        background: none;
        border: none;
        cursor: pointer;
        padding: 10px;
        border-radius: 50%;
        color: var(--text2);
        transition:
          color 0.2s,
          background 0.2s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ctrl:hover {
        color: var(--text);
        background: var(--glass);
      }
      .ctrl:active {
        transform: scale(0.9);
      }
      .ctrl.active {
        color: var(--accent);
      }
      #playBtn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: none;
        border: 2px solid var(--accent);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
        box-shadow:
          0 0 20px var(--accent-glow),
          inset 0 0 20px var(--accent-dim);
      }
      #playBtn:hover {
        background: var(--accent-dim);
        box-shadow:
          0 0 40px var(--accent-glow),
          inset 0 0 20px var(--accent-dim);
        transform: scale(1.05);
      }
      #playBtn:active {
        transform: scale(0.95);
      }
      #playBtn.beat {
        animation: beatPulse 0.15s ease-out;
      }
      @keyframes beatPulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      /* volume */
      #vol-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #vol-icon {
        font-size: 14px;
        color: var(--text2);
        min-width: 18px;
        text-align: center;
        cursor: pointer;
      }
      #vol-slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 3px;
        border-radius: 3px;
        background: linear-gradient(
          90deg,
          var(--accent) var(--vol-pct, 80%),
          var(--bg3) var(--vol-pct, 80%)
        );
        outline: none;
        cursor: pointer;
        transition: background 0.8s;
      }
      #vol-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent-glow);
        cursor: pointer;
        transition: background 0.8s;
      }
      #vol-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        cursor: pointer;
      }
      #vol-val {
        font-size: 11px;
        color: var(--text2);
        min-width: 28px;
        text-align: right;
      }

      /* theme dots */
      #theme-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #theme-label {
        font-size: 11px;
        color: var(--text2);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-right: 4px;
      }
      .tdot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          transform 0.2s,
          border-color 0.2s;
        flex-shrink: 0;
      }
      .tdot:hover {
        transform: scale(1.3);
      }
      .tdot.active {
        border-color: white;
        transform: scale(1.2);
      }
      #auto-color-btn {
        margin-left: auto;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: var(--glass);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 20px;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s,
          border-color 0.8s;
      }
      #auto-color-btn.on {
        background: var(--accent-dim);
      }
      #beat-color-btn {
        margin-left: 6px;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: var(--glass);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 20px;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s,
          border-color 0.8s;
      }
      #beat-color-btn.on {
        background: var(--accent-dim);
      }

      /* ─── RIGHT PANEL ─── */
      #right-panel {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* canvas */
      #visualizer-wrap {
        background: var(--bg2);
        border-radius: 16px;
        border: 1px solid var(--glass);
        overflow: hidden;
        position: relative;
        transition: border-color 0.8s;
      }
      #visCanvas {
        display: block;
        width: 100%;
        height: 200px;
      }
      #vis-label {
        position: absolute;
        top: 12px;
        left: 16px;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text2);
        opacity: 0.6;
      }
      #vis-mode-btns {
        position: absolute;
        top: 8px;
        right: 12px;
        display: flex;
        gap: 6px;
      }
      .vis-mode-btn {
        font-size: 10px;
        letter-spacing: 1px;
        background: var(--glass);
        border: 1px solid transparent;
        color: var(--text2);
        padding: 3px 8px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .vis-mode-btn.active {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* stats bar */
      #stats-bar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .stat-card {
        background: var(--bg2);
        border-radius: 12px;
        border: 1px solid var(--glass);
        padding: 12px 16px;
        transition: border-color 0.8s;
      }
      .stat-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text2);
        margin-bottom: 4px;
      }
      .stat-val {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        color: var(--accent);
        letter-spacing: 1px;
        transition: color 0.8s;
      }

      /* playlist */
      #playlist-wrap {
        flex: 1;
        background: var(--bg2);
        border-radius: 16px;
        border: 1px solid var(--glass);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: border-color 0.8s;
      }
      #playlist-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--glass);
      }
      #playlist-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
        color: var(--text);
      }
      #track-count {
        font-size: 12px;
        color: var(--text2);
        margin-left: 4px;
      }
      #upload-btn {
        margin-left: auto;
        background: linear-gradient(135deg, var(--accent-dark), var(--accent));
        border: none;
        color: white;
        padding: 7px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
        transition:
          opacity 0.2s,
          background 0.8s;
        box-shadow: 0 4px 15px var(--accent-glow);
      }
      #upload-btn:hover {
        opacity: 0.85;
      }
      #fileInput {
        display: none;
      }

      #playlist-body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      #playlist-body::-webkit-scrollbar {
        width: 6px;
      }
      #playlist-body::-webkit-scrollbar-track {
        background: transparent;
      }
      #playlist-body::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 3px;
        transition:
          background 0.3s,
          box-shadow 0.3s;
      }
      #playlist-body::-webkit-scrollbar-thumb:hover {
        background: var(--accent-dark);
        box-shadow: 0 0 6px var(--accent-glow);
      }

      .track-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 20px;
        cursor: pointer;
        position: relative;
        transition: background 0.15s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }
      .track-row:hover {
        background: var(--glass);
      }
      .track-row.active {
        background: var(--accent-dim);
      }
      .track-row.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 3px;
        background: var(--accent);
        border-radius: 0 2px 2px 0;
        transition: background 0.8s;
      }
      .t-num {
        font-size: 12px;
        color: var(--text2);
        min-width: 20px;
        text-align: center;
      }
      .t-eq {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 16px;
        min-width: 20px;
        justify-content: center;
      }
      .t-bar {
        width: 3px;
        border-radius: 1px;
        background: var(--accent);
        min-height: 3px;
        transition: background 0.8s;
      }
      .t-bar.b1 {
        animation: eq1 0.5s ease-in-out infinite alternate;
      }
      .t-bar.b2 {
        animation: eq2 0.7s ease-in-out infinite alternate;
      }
      .t-bar.b3 {
        animation: eq1 0.4s ease-in-out infinite alternate;
      }
      @keyframes eq1 {
        from {
          height: 3px;
        }
        to {
          height: 16px;
        }
      }
      @keyframes eq2 {
        from {
          height: 6px;
        }
        to {
          height: 12px;
        }
      }
      .t-info {
        flex: 1;
        min-width: 0;
      }
      .t-name {
        font-size: 14px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .t-dur {
        font-size: 12px;
        color: var(--text2);
        margin-top: 2px;
      }
      .t-del {
        opacity: 0;
        background: none;
        border: none;
        color: var(--text2);
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition:
          opacity 0.2s,
          color 0.2s;
        font-size: 16px;
        line-height: 1;
      }
      .track-row:hover .t-del {
        opacity: 1;
      }
      .t-del:hover {
        color: #ef4444;
      }

      #empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--text2);
      }
      #empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      #empty-text {
        font-size: 14px;
        line-height: 1.6;
      }

      /* beat flash overlay */
      #beat-flash {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.05s;
      }

      /* responsive */
      @media (max-width: 768px) {
        #app {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        #player-panel {
          padding-right: 0;
        }
        #header {
          margin-bottom: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="bg-layer">
      <div class="orb" id="orb1"></div>
      <div class="orb" id="orb2"></div>
      <div class="orb" id="orb3"></div>
    </div>
    <div id="grain"></div>
    <div id="beat-flash"></div>

    <div id="app">
      <div id="header">
        <div id="logo">ÂM THANH</div>
        <div id="header-meta">
          Music Player &nbsp;/&nbsp; <span id="status-text">Chờ nhạc...</span>
        </div>
      </div>

      <!-- LEFT: Player -->
      <div id="player-panel">
        <!-- Artwork -->
        <div id="artwork-wrap">
          <div id="artwork-bg"></div>
          <div id="artwork-ring"></div>
          <div id="artwork-inner">
            <div id="artwork-icon">🎵</div>
            <div
              style="
                font-size: 13px;
                color: var(--text2);
                text-align: center;
                padding: 0 20px;
              "
            >
              Upload nhạc để bắt đầu
            </div>
          </div>
          <div id="artwork-vinyl">
            <div id="vinyl-disc">
              <div id="vinyl-grooves"></div>
              <div id="vinyl-center"></div>
            </div>
          </div>
        </div>

        <!-- Progress -->
        <div id="progress-section">
          <!-- Track name marquee -->
          <div id="track-name-marquee">
            <div id="track-name">Chưa có bài nào</div>
          </div>
          <div id="progress-bar-wrap" id="pbar">
            <div id="progress-fill" style="width: 0%"></div>
            <div id="progress-thumb" style="left: 0%"></div>
          </div>
          <div id="time-row">
            <span id="cur-time">0:00</span>
            <span id="dur-time">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div id="controls-row">
          <button class="ctrl" id="shuffleBtn" title="Ngẫu nhiên">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"

            >
              <polyline points="16 3 21 3 21 8" />
              <line x1="4" y1="20" x2="21" y2="3" />

            </svg>
          </button>
          <button class="ctrl" id="prevBtn" title="Bài trước">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="19 20 9 12 19 4 19 20" />
              <line x1="5" y1="19" x2="5" y2="5" />
            </svg>
          </button>
          <button id="playBtn" title="Phát / Dừng">
            <svg
              id="playIcon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
          <button class="ctrl" id="nextBtn" title="Bài tiếp">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 4 15 12 5 20 5 4" />
              <line x1="19" y1="5" x2="19" y2="19" />
            </svg>
          </button>
          <button class="ctrl" id="repeatBtn" title="Phát lặp">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="17 1 21 5 17 9" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <polyline points="7 23 3 19 7 15" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </button>

        <!-- Volume -->
        <div id="vol-row">
          <span id="vol-icon">🔈</span>
          <input
            type="range"
            id="vol-slider"
            min="0"
            max="1"
            step="0.01"
            value="0.8"
          />
          <span id="vol-val">80%</span>
        </div>

        <!-- Theme -->
        <div id="theme-row">
          <span id="theme-label">Màu</span>
          <div
            class="tdot active"
            style="background: linear-gradient(135deg, #7c3aed, #c084fc)"
            data-h="270"
          ></div>
          <div
            class="tdot"
            style="background: linear-gradient(135deg, #0ea5e9, #38bdf8)"
            data-h="200"
          ></div>
          <div
            class="tdot"
            style="background: linear-gradient(135deg, #10b981, #6ee7b7)"
            data-h="160"
          ></div>
          <div
            class="tdot"
            style="background: linear-gradient(135deg, #f59e0b, #fde68a)"
            data-h="40"
          ></div>
          <div
            class="tdot"
            style="background: linear-gradient(135deg, #ef4444, #fca5a5)"
            data-h="0"
          ></div>
          <div
            class="tdot"
            style="background: linear-gradient(135deg, #ec4899, #f9a8d4)"
            data-h="325"
          ></div>
          <button id="auto-color-btn" title="Đổi màu theo nhạc">🎨 Auto</button>
          <button id="beat-color-btn" title="Đổi màu khi bass > 20%">
            🔊 Bass
          </button>
        </div>
      </div>

      <!-- RIGHT: Visualizer + Playlist -->
      <div id="right-panel">
        <div id="visualizer-wrap">
          <canvas id="visCanvas"></canvas>
          <div id="vis-label">Visualizer</div>
          <div id="vis-mode-btns">
            <button class="vis-mode-btn active" data-mode="bars">Cột</button>
            <button class="vis-mode-btn" data-mode="wave">Sóng</button>
            <button class="vis-mode-btn" data-mode="circle">Tròn</button>
            <button class="vis-mode-btn" data-mode="particles">Hạt</button>
          </div>
        </div>

        <div id="stats-bar">
          <div class="stat-card">
            <div class="stat-label">Năng lượng</div>
            <div class="stat-val" id="stat-energy">0%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Tần số cao</div>
            <div class="stat-val" id="stat-treble">0%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Bass</div>
            <div class="stat-val" id="stat-bass">0%</div>
          </div>
        </div>

        <div id="playlist-wrap">
          <div id="playlist-head">
            <span id="playlist-title">Danh Sách Phát</span>
            <span id="track-count">0 bài</span>
            <button id="upload-btn">+ Thêm Nhạc</button>
            <input type="file" id="fileInput" accept="audio/*" multiple />
          </div>
          <div id="playlist-body">
            <div id="empty-state">
              <div id="empty-icon">🎧</div>
              <div id="empty-text">
                Chưa có bài nhạc nào.<br />Nhấn "+ Thêm Nhạc" để upload.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        /* ── Elements ── */
        const $ = (id) => document.getElementById(id);
        const root = document.documentElement;
        const body = document.body;
        const visCanvas = $("visCanvas");
        const vCtx = visCanvas.getContext("2d");
        const playBtn = $("playBtn");
        const playIcon = $("playIcon");
        const prevBtn = $("prevBtn");
        const nextBtn = $("nextBtn");
        const shuffleBtn = $("shuffleBtn");
        const repeatBtn = $("repeatBtn");
        const progressFill = $("progress-fill");
        const progressThumb = $("progress-thumb");
        const progressWrap = $("progress-bar-wrap");
        const curTimeEl = $("cur-time");
        const durTimeEl = $("dur-time");
        const volSlider = $("vol-slider");
        const volIcon = $("vol-icon");
        const volVal = $("vol-val");
        const trackNameEl = $("track-name");
        const vinylDisc = $("vinyl-disc");
        const artworkVinyl = $("artwork-vinyl");
        const artworkInner = $("artwork-inner");
        const statusText = $("status-text");
        const playlistBody = $("playlist-body");
        const emptyState = $("empty-state");
        const trackCount = $("track-count");
        const beatFlash = $("beat-flash");
        const autoColorBtn = $("auto-color-btn");
        const statEnergy = $("stat-energy");
        const statTreble = $("stat-treble");
        const statBass = $("stat-bass");

        /* ── State ── */
        let audio = new Audio();
        audio.volume = 0.8;
        let audioCtx, analyser, source, gainNode;
        let dataFreq, dataTime;
        let tracks = [];
        let currentIdx = -1;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false;
        let autoColor = false;
        let beatColor = false;
        let beatColorIdx = 0;
        let currentHue = 270;
        let visMode = "bars";
        let animId;
        let particles = [];
        let lastBeat = 0;
        let beatThreshold = 200;
        let lastBassColorChange = 0;
        const beatHues = [270, 0, 40, 200, 160, 325]; // Purple, Red, Orange, Cyan, Green, Pink

        /* ── Audio Context Setup ── */
        function setupAudio() {
          if (audioCtx) return;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 2048;
          analyser.smoothingTimeConstant = 0.8;
          gainNode = audioCtx.createGain();
          gainNode.gain.value = audio.volume;
          source = audioCtx.createMediaElementSource(audio);
          source.connect(gainNode);
          gainNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          dataFreq = new Uint8Array(analyser.frequencyBinCount);
          dataTime = new Uint8Array(analyser.frequencyBinCount);
        }

        /* ── Color System ── */
        function setHue(h, animated = true) {
          currentHue = h;
          const speed = animated ? "0.8s" : "0s";
          root.style.setProperty("transition", `background ${speed}`);
          root.style.setProperty("--h", h);
          updateVolSliderBg();
        }

        function updateVolSliderBg() {
          const pct = volSlider.value * 100;
          $("vol-slider").style.setProperty("--vol-pct", pct + "%");
          $("vol-slider").style.background =
            `linear-gradient(90deg, hsl(${currentHue},70%,65%) ${pct}%, var(--bg3) ${pct}%)`;
        }

        /* Dynamic color from audio analysis */
        function computeAutoColor(freqData) {
          if (!freqData) return;
          const len = freqData.length;
          const bass = avg(freqData, 0, Math.floor(len * 0.05));
          const mid = avg(
            freqData,
            Math.floor(len * 0.05),
            Math.floor(len * 0.3),
          );
          const treble = avg(
            freqData,
            Math.floor(len * 0.3),
            Math.floor(len * 0.7),
          );
          const total = (bass + mid + treble) / 3 / 255;
          if (total < 0.02) return;

          // Map: heavy bass → warm reds/purples, bright treble → cyan/blue
          // Add some randomness to prevent getting stuck
          const bassInfluence = (bass / 255) * 120; // 0-120 degrees
          const trebleInfluence = (treble / 255) * 120; // 0-120 degrees
          const randomOffset = (Math.sin(Date.now() * 0.001) + 1) * 30; // 0-60 degrees oscillation

          let targetHue = 270 - bassInfluence + trebleInfluence + randomOffset;

          // Ensure hue is within 0-360 range
          targetHue = ((targetHue % 360) + 360) % 360;

          // Faster transition to make color changes more responsive
          currentHue += (targetHue - currentHue) * 0.08;
          setHue(Math.round(currentHue), false);
        }

        function avg(arr, start, end) {
          let s = 0;
          for (let i = start; i < end; i++) s += arr[i];
          return s / (end - start) || 0;
        }

        /* ── Beat Detection ── */
        function detectBeat(freqData) {
          if (!freqData) return false;
          const bassEnergy = avg(freqData, 0, 8);
          const now = performance.now();
          if (bassEnergy > beatThreshold && now - lastBeat > 300) {
            lastBeat = now;
            triggerBeat();
            return true;
          }
          return false;
        }

        function triggerBeat() {
          beatFlash.style.opacity = "0.04";
          setTimeout(() => {
            beatFlash.style.opacity = "0";
          }, 80);
          playBtn.classList.add("beat");
          setTimeout(() => playBtn.classList.remove("beat"), 150);
        }

        /* ── Visualizer ── */
        function resizeCanvas() {
          const rect = visCanvas.parentElement.getBoundingClientRect();
          visCanvas.width = rect.width;
          visCanvas.height = rect.height || 200;
        }

        function drawBars(W, H, data) {
          const bars = Math.floor(data.length * 0.6);
          const barW = W / bars - 1;
          vCtx.clearRect(0, 0, W, H);
          for (let i = 0; i < bars; i++) {
            const v = data[i] / 255;
            const bH = v * H * 0.92;
            const hue = currentHue + (i / bars) * 60 - 30;
            const alpha = 0.4 + v * 0.6;
            const grad = vCtx.createLinearGradient(0, H - bH, 0, H);
            grad.addColorStop(0, `hsla(${hue + 20}, 80%, 75%, ${alpha})`);
            grad.addColorStop(1, `hsla(${hue}, 65%, 45%, ${alpha * 0.4})`);
            vCtx.fillStyle = grad;
            vCtx.beginPath();
            vCtx.roundRect(i * (barW + 1), H - bH, barW, bH, 2);
            vCtx.fill();
            // Mirror reflection
            vCtx.fillStyle = `hsla(${hue}, 70%, 60%, ${alpha * 0.1})`;
            vCtx.fillRect(i * (barW + 1), 0, barW, bH * 0.3);
          }
        }

        function drawWave(W, H, timeData) {
          vCtx.clearRect(0, 0, W, H);
          vCtx.lineWidth = 2;
          vCtx.strokeStyle = `hsl(${currentHue}, 70%, 65%)`;
          vCtx.shadowColor = `hsl(${currentHue}, 70%, 65%)`;
          vCtx.shadowBlur = 8;
          vCtx.beginPath();
          const sliceW = W / timeData.length;
          let x = 0;
          for (let i = 0; i < timeData.length; i++) {
            const v = timeData[i] / 128 - 1;
            const y = (v * H) / 2 + H / 2;
            i === 0 ? vCtx.moveTo(x, y) : vCtx.lineTo(x, y);
            x += sliceW;
          }
          vCtx.stroke();
          vCtx.shadowBlur = 0;
        }

        function drawCircle(W, H, data) {
          vCtx.clearRect(0, 0, W, H);
          const cx = W / 2,
            cy = H / 2;
          const bars = 128;
          const baseR = Math.min(W, H) * 0.22;
          for (let i = 0; i < bars; i++) {
            const v = data[i] / 255;
            const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
            const r1 = baseR;
            const r2 = baseR + v * baseR * 1.4;
            const hue = currentHue + (i / bars) * 80;
            vCtx.strokeStyle = `hsla(${hue}, 80%, 70%, ${0.3 + v * 0.7})`;
            vCtx.lineWidth = 2;
            vCtx.shadowColor = `hsla(${hue}, 80%, 70%, 0.5)`;
            vCtx.shadowBlur = v > 0.5 ? 6 : 0;
            vCtx.beginPath();
            vCtx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
            vCtx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
            vCtx.stroke();
          }
          // Center circle
          vCtx.shadowBlur = 0;
          vCtx.beginPath();
          vCtx.arc(cx, cy, baseR * 0.6, 0, Math.PI * 2);
          vCtx.strokeStyle = `hsla(${currentHue}, 60%, 60%, 0.3)`;
          vCtx.lineWidth = 1;
          vCtx.stroke();
        }

        function drawParticles(W, H, data) {
          vCtx.fillStyle = "rgba(0,0,0,0.15)";
          vCtx.fillRect(0, 0, W, H);
          const energy = avg(data, 0, data.length) / 255;
          // Spawn new particles on beats
          if (energy > 0.4 && Math.random() < energy * 0.4) {
            for (let k = 0; k < 3; k++) {
              particles.push({
                x: Math.random() * W,
                y: H,
                vx: (Math.random() - 0.5) * 4,
                vy: -(2 + Math.random() * 4 + energy * 6),
                r: 2 + Math.random() * 4,
                life: 1,
                hue: currentHue + (Math.random() - 0.5) * 60,
              });
            }
          }
          particles = particles.filter((p) => p.life > 0);
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1;
            p.life -= 0.015;
            vCtx.beginPath();
            vCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            vCtx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.life})`;
            vCtx.fill();
          });
        }

        function drawIdleState(W, H) {
          const t = Date.now() / 1000;
          vCtx.clearRect(0, 0, W, H);
          const bars = 60;
          const bW = W / bars - 1;
          for (let i = 0; i < bars; i++) {
            const v =
              (Math.sin(i * 0.35 + t * 1.5) + Math.sin(i * 0.15 + t)) * 0.25 +
              0.08;
            const bH = Math.max(2, v * H);
            vCtx.fillStyle = `hsla(${currentHue + (i / bars) * 40 - 20}, 50%, 55%, 0.25)`;
            vCtx.beginPath();
            vCtx.roundRect(i * (bW + 1), H / 2 - bH / 2, bW, bH, 2);
            vCtx.fill();
          }
        }

        /* ── Main Animation Loop ── */
        function animate() {
          animId = requestAnimationFrame(animate);
          const W = visCanvas.width,
            H = visCanvas.height;
          if (!analyser || !isPlaying) {
            drawIdleState(W, H);
            return;
          }
          analyser.getByteFrequencyData(dataFreq);
          analyser.getByteTimeDomainData(dataTime);

          const bassVal = avg(dataFreq, 0, 8);
          const trebleVal = avg(
            dataFreq,
            Math.floor(dataFreq.length * 0.4),
            Math.floor(dataFreq.length * 0.8),
          );
          const energyVal = avg(dataFreq, 0, dataFreq.length);

          // Stats
          statEnergy.textContent = Math.round((energyVal / 255) * 100) + "%";
          statBass.textContent = Math.round((bassVal / 255) * 100) + "%";
          statTreble.textContent = Math.round((trebleVal / 255) * 100) + "%";

          // Beat detection
          beatThreshold = 160 + energyVal * 0.3;
          detectBeat(dataFreq);

          // Beat color mode - change color when bass jumps above 80%
          if (beatColor) {
            const bassPercent = (bassVal / 255) * 100;
            const now = performance.now();
            if (bassPercent > 80 && now - lastBassColorChange > 400) {
              lastBassColorChange = now;
              beatColorIdx = (beatColorIdx + 1) % beatHues.length;
              setHue(beatHues[beatColorIdx], true);
            }
          }

          // Auto color
          if (autoColor) computeAutoColor(dataFreq);

          // Draw mode
          switch (visMode) {
            case "bars":
              drawBars(W, H, dataFreq);
              break;
            case "wave":
              drawWave(W, H, dataTime);
              break;
            case "circle":
              drawCircle(W, H, dataFreq);
              break;
            case "particles":
              drawParticles(W, H, dataFreq);
              break;
          }
        }

        /* ── Playback ── */
        function loadAndPlay(idx) {
          if (idx < 0 || idx >= tracks.length) return;
          currentIdx = idx;
          const t = tracks[idx];
          audio.src = t.url;
          trackNameEl.textContent = t.name;
          statusText.textContent = t.name;
          artworkVinyl.classList.add("visible");
          artworkInner.style.opacity = "0";
          renderPlaylist();

          audio.addEventListener(
            "canplay",
            function once() {
              audio.removeEventListener("canplay", once);
              setupAudio();
              if (audioCtx.state === "suspended") audioCtx.resume();
              audio
                .play()
                .then(() => {
                  isPlaying = true;
                  setPause();
                  vinylDisc.classList.add("spinning");
                  // Update track name with duration
                  trackNameEl.textContent =
                    t.name + " — " + fmt(audio.duration);
                })
                .catch(console.warn);
            },
            { once: true },
          );
        }

        function setPause() {
          playIcon.innerHTML =
            '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
        }
        function setPlay() {
          playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
        }

        playBtn.addEventListener("click", () => {
          if (!tracks.length) return;
          if (currentIdx < 0) {
            loadAndPlay(0);
            return;
          }
          setupAudio();
          if (isPlaying) {
            audio.pause();
            isPlaying = false;
            setPlay();
            vinylDisc.classList.remove("spinning");
          } else {
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
            audio.play();
            isPlaying = true;
            setPause();
            vinylDisc.classList.add("spinning");
          }
        });

        prevBtn.addEventListener("click", () => {
          if (!tracks.length) return;
          if (audio.currentTime > 3) {
            audio.currentTime = 0;
            return;
          }
          const idx = isShuffle
            ? randIdx()
            : (currentIdx - 1 + tracks.length) % tracks.length;
          loadAndPlay(idx);
        });
        nextBtn.addEventListener("click", () => {
          if (!tracks.length) return;
          const idx = isShuffle ? randIdx() : (currentIdx + 1) % tracks.length;
          loadAndPlay(idx);
        });
        shuffleBtn.addEventListener("click", () => {
          isShuffle = !isShuffle;
          shuffleBtn.classList.toggle("active", isShuffle);
        });
        repeatBtn.addEventListener("click", () => {
          isRepeat = !isRepeat;
          repeatBtn.classList.toggle("active", isRepeat);
        });

        audio.addEventListener("ended", () => {
          if (isRepeat) {
            audio.currentTime = 0;
            audio.play();
            return;
          }
          const next = isShuffle ? randIdx() : currentIdx + 1;
          if (next < tracks.length) {
            loadAndPlay(next);
          } else {
            isPlaying = false;
            setPlay();
            vinylDisc.classList.remove("spinning");
            statusText.textContent = "Kết thúc";
          }
        });

        function randIdx() {
          return Math.floor(Math.random() * tracks.length);
        }

        /* ── Progress ── */
        audio.addEventListener("timeupdate", () => {
          if (!audio.duration) return;
          const pct = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = pct + "%";
          progressThumb.style.left = pct + "%";
          curTimeEl.textContent = fmt(audio.currentTime);
          durTimeEl.textContent = fmt(audio.duration);
        });

        audio.addEventListener("loadedmetadata", () => {
          durTimeEl.textContent = fmt(audio.duration);
          // Update track name with duration
          if (tracks[currentIdx]) {
            trackNameEl.textContent =
              tracks[currentIdx].name + " — " + fmt(audio.duration);
          }
        });

        let isDragging = false;
        progressWrap.addEventListener("mousedown", (e) => {
          isDragging = true;
          seekTo(e);
        });
        document.addEventListener("mousemove", (e) => {
          if (isDragging) seekTo(e);
        });
        document.addEventListener("mouseup", () => {
          isDragging = false;
        });
        progressWrap.addEventListener(
          "touchstart",
          (e) => {
            isDragging = true;
            seekTo(e.touches[0]);
          },
          { passive: true },
        );
        document.addEventListener(
          "touchmove",
          (e) => {
            if (isDragging) seekTo(e.touches[0]);
          },
          { passive: true },
        );
        document.addEventListener("touchend", () => {
          isDragging = false;
        });

        function seekTo(e) {
          const rect = progressWrap.getBoundingClientRect();
          const pct = Math.max(
            0,
            Math.min(1, (e.clientX - rect.left) / rect.width),
          );
          if (audio.duration) audio.currentTime = pct * audio.duration;
        }

        /* ── Volume ── */
        volSlider.addEventListener("input", () => {
          audio.volume = volSlider.value;
          if (gainNode) gainNode.gain.value = volSlider.value;
          volVal.textContent = Math.round(volSlider.value * 100) + "%";
          volIcon.textContent =
            volSlider.value == 0 ? "🔇" : volSlider.value < 0.4 ? "🔈" : "🔉";
          updateVolSliderBg();
        });

        /* ── IndexedDB Setup ── */
        let db;
        const dbName = "AudioPlayerDB";
        const dbVersion = 1;
        const storeName = "tracks";

        function initIndexedDB() {
          return new Promise((resolve, reject) => {
            const req = indexedDB.open(dbName, dbVersion);

            req.onerror = () => reject(req.error);
            req.onsuccess = () => {
              db = req.result;
              resolve(db);
            };

            req.onupgradeneeded = (e) => {
              const database = e.target.result;
              if (!database.objectStoreNames.contains(storeName)) {
                database.createObjectStore(storeName, {
                  keyPath: "id",
                  autoIncrement: true,
                });
              }
            };
          });
        }

        /* ── File Upload ── */
        // Convert file to Blob and save to IndexedDB
        function addAudioFile(f) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const arrayBuffer = e.target.result;
            const blob = new Blob([arrayBuffer], { type: f.type });
            const trackObj = {
              name: f.name.replace(/\.[^.]+$/, ""),
              blob: blob,
              size: f.size,
              timestamp: Date.now(),
            };

            // Create object URL for playback
            const objectUrl = URL.createObjectURL(blob);
            tracks.push({
              name: trackObj.name,
              url: objectUrl,
              blob: blob,
              id: null,
            });

            saveTrackToIndexedDB(trackObj, tracks.length - 1);
            renderPlaylist();
          };
          reader.readAsArrayBuffer(f);
        }

        // Save track to IndexedDB
        function saveTrackToIndexedDB(trackObj, trackIdx) {
          if (!db) {
            console.warn("IndexedDB not initialized");
            return;
          }

          const transaction = db.transaction([storeName], "readwrite");
          const store = transaction.objectStore(storeName);
          const req = store.add(trackObj);

          req.onsuccess = () => {
            tracks[trackIdx].id = req.result;
            console.log("Track saved to IndexedDB:", trackObj.name);
          };

          transaction.onerror = () => {
            console.error("Error saving track:", transaction.error);
          };
        }

        // Load all tracks from IndexedDB on page load
        function loadTracksFromIndexedDB() {
          if (!db) return;

          const transaction = db.transaction([storeName], "readonly");
          const store = transaction.objectStore(storeName);
          const req = store.getAll();

          req.onsuccess = () => {
            const tracksData = req.result;
            tracks = tracksData.map((t) => {
              const blob = new Blob([t.blob], { type: "audio/*" });
              return {
                name: t.name,
                url: URL.createObjectURL(blob),
                blob: blob,
                id: t.id,
              };
            });
            renderPlaylist();
          };
        }

        // Delete track from IndexedDB
        function deleteTrackFromIndexedDB(idx) {
          if (!db || !tracks[idx] || !tracks[idx].id) return;

          const transaction = db.transaction([storeName], "readwrite");
          const store = transaction.objectStore(storeName);
          store.delete(tracks[idx].id);

          transaction.oncomplete = () => {
            console.log("Track deleted from IndexedDB");
          };
        }

        $("upload-btn").addEventListener("click", () => $("fileInput").click());
        $("fileInput").addEventListener("change", (e) => {
          const files = Array.from(e.target.files);
          const wasEmpty = !tracks.length;
          files.forEach(addAudioFile);
          if (wasEmpty && tracks.length > 0) {
            setTimeout(() => loadAndPlay(0), 100);
          }
          $("fileInput").value = "";
        });

        /* Drag & drop onto page */
        document.addEventListener("dragover", (e) => e.preventDefault());
        document.addEventListener("drop", (e) => {
          e.preventDefault();
          const files = Array.from(e.dataTransfer.files).filter((f) =>
            f.type.startsWith("audio"),
          );
          if (!files.length) return;
          const wasEmpty = !tracks.length;
          files.forEach(addAudioFile);
          if (wasEmpty && tracks.length > 0) {
            setTimeout(() => loadAndPlay(0), 100);
          }
        });

        /* ── Playlist ── */
        function renderPlaylist() {
          trackCount.textContent = tracks.length + " bài";
          if (!tracks.length) {
            playlistBody.innerHTML = "";
            playlistBody.appendChild(emptyState);
            return;
          }
          emptyState.remove();
          playlistBody.innerHTML = tracks
            .map(
              (t, i) => `
    <button class="track-row ${i === currentIdx ? "active" : ""}" data-idx="${i}">
      ${
        i === currentIdx && isPlaying
          ? `<div class="t-eq"><div class="t-bar b1" style="height:8px"></div><div class="t-bar b2" style="height:12px"></div><div class="t-bar b3" style="height:5px"></div></div>`
          : `<span class="t-num">${i + 1}</span>`
      }
      <div class="t-info">
        <div class="t-name">${esc(t.name)}</div>
      </div>
      <button class="t-del" data-del="${i}" title="Xóa">✕</button>
    </button>
  `,
            )
            .join("");

          playlistBody.querySelectorAll(".track-row").forEach((el) => {
            el.addEventListener("click", (e) => {
              if (e.target.closest(".t-del")) return;
              loadAndPlay(+el.dataset.idx);
            });
          });
          playlistBody.querySelectorAll(".t-del").forEach((el) => {
            el.addEventListener("click", (e) => {
              e.stopPropagation();
              const idx = +el.dataset.del;
              deleteTrackFromIndexedDB(idx);
              tracks.splice(idx, 1);
              if (idx === currentIdx) {
                if (tracks.length)
                  loadAndPlay(Math.min(idx, tracks.length - 1));
                else {
                  audio.pause();
                  isPlaying = false;
                  setPlay();
                  vinylDisc.classList.remove("spinning");
                  currentIdx = -1;
                  artworkVinyl.classList.remove("visible");
                  artworkInner.style.opacity = "1";
                }
              } else if (idx < currentIdx) {
                currentIdx--;
              }
              renderPlaylist();
            });
          });
        }

        /* ── Theme Dots ── */
        document.querySelectorAll(".tdot").forEach((dot) => {
          dot.addEventListener("click", () => {
            document
              .querySelectorAll(".tdot")
              .forEach((d) => d.classList.remove("active"));
            dot.classList.add("active");
            autoColor = false;
            beatColor = false;
            autoColorBtn.classList.remove("on");
            $("beat-color-btn").classList.remove("on");
            setHue(+dot.dataset.h);
          });
        });

        autoColorBtn.addEventListener("click", () => {
          autoColor = !autoColor;
          beatColor = false;
          $("beat-color-btn").classList.remove("on");
          autoColorBtn.classList.toggle("on", autoColor);
          autoColorBtn.textContent = autoColor ? "🎨 On" : "🎨 Auto";
        });

        $("beat-color-btn").addEventListener("click", () => {
          beatColor = !beatColor;
          autoColor = false;
          autoColorBtn.classList.remove("on");
          $("beat-color-btn").classList.toggle("on", beatColor);
          $("beat-color-btn").textContent = beatColor ? "🔊 On" : "🔊 Bass";
        });

        /* ── Vis Mode Buttons ── */
        document.querySelectorAll(".vis-mode-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".vis-mode-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            visMode = btn.dataset.mode;
            particles = [];
          });
        });

        /* ── Keyboard Shortcuts ── */
        document.addEventListener("keydown", (e) => {
          if (e.target.tagName === "INPUT") return;
          if (e.code === "Space") {
            e.preventDefault();
            playBtn.click();
          }
          if (e.code === "ArrowRight") {
            if (audio.duration)
              audio.currentTime = Math.min(
                audio.duration,
                audio.currentTime + 5,
              );
          }
          if (e.code === "ArrowLeft") {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
          }
          if (e.code === "ArrowUp") {
            volSlider.value = Math.min(1, +volSlider.value + 0.05);
            volSlider.dispatchEvent(new Event("input"));
          }
          if (e.code === "ArrowDown") {
            volSlider.value = Math.max(0, +volSlider.value - 0.05);
            volSlider.dispatchEvent(new Event("input"));
          }
          if (e.code === "KeyN") nextBtn.click();
          if (e.code === "KeyP") prevBtn.click();
        });

        /* ── Helpers ── */
        function fmt(s) {
          if (!s || isNaN(s)) return "0:00";
          const m = Math.floor(s / 60),
            sec = Math.floor(s % 60);
          return m + ":" + (sec < 10 ? "0" : "") + sec;
        }
        function esc(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        /* ── Init ── */
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        updateVolSliderBg();
        initIndexedDB()
          .then(() => {
            loadTracksFromIndexedDB();
          })
          .catch((err) => {
            console.error("Failed to initialize IndexedDB:", err);
          });
        animate();
      })();
    </script>
  </body>
</html>
